<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>تسجيل الدخول — {{ app_name }}</title><link rel="stylesheet" href="/static/style.css"><link rel="stylesheet" href="/static/polish.css"><link rel="stylesheet" href="/static/hardening.css"></head>
<body class="login-body"><main class="login-card"><div class="brand-mark">M</div><p class="eyebrow">بوابة الإدارة الآمنة</p><h1>{{ app_name }}</h1><p class="muted">أدخل بيانات المشرف للوصول إلى المزودات والبوت والملفات.</p>{% if error %}<div class="alert error">{{ error }}</div>{% endif %}<form method="post" class="stack"><label>اسم المستخدم<input name="username" autocomplete="username" required></label><label>كلمة المرور<input name="password" type="password" autocomplete="current-password" required></label><button class="primary">دخول آمن ←</button></form><small>المفاتيح تُحفظ مشفّرة ولا تظهر مرة أخرى.</small></main></body></html>
